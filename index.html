<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>REGISTRATION</title>
  <link rel="stylesheet" href="index.css">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body>
  <div class="container">
    <div class="header">
      <img src="destructure.png" alt="Youth Discipleship Masterclass" class="logo">
    </div>

    <form id="registrationForm">
      <div class="heady">
        <div class="heady-strip"></div>
        <div class="heady-content">
          <h2>REGISTRATION</h2>
        </div>
      </div>

      <div class="inputer">
        <label for="name">Name <span class="required">*</span></label>
        <input type="text" name="name" id="name" placeholder="your answer" required>
      </div>

      <div class="inputer">
        <label for="phone">Phone/Whatsapp Number <span class="required">*</span></label>
        <input type="text" name="phone" id="phone" placeholder="your answer" required>
      </div>

      <div class="inputer">
        <label for="address">Address <span class="required">*</span></label>
        <input type="text" name="address" id="address" placeholder="your answer" required>
      </div>

      <div class="inputer">
        <label for="source">How did you hear about the program? <span class="required">*</span></label>
        <input type="text" name="source" id="source" placeholder="your answer" required>
      </div>

      <div class="form-actions">
        <button type="submit">Submit</button>
        <button type="reset" class="clear-btn">Clear form</button>
      </div>
    </form>
  </div>

  <script src="index.js"></script>
</body>
</html>
