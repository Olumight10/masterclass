<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Youth Discipleship Masterclass</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
      background-color: #f4f0e6;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .container {
      display: flex;
      background-color: #ffffff;
      max-width: 500px;
      width: 100%;
      box-shadow: 0 4px 15px rgba(0,0,0,0.15);
      border-radius: 10px;
      overflow: hidden;
    }

    .flyer {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 10px;
    }

    .flyer img {
      max-width: 100%;
      height: auto;
      display: block;
      border-radius: 8px;
    }
  </style>
</head>
<body>

  <div class="container">
    <div class="flyer">
      <img src="masterclass_flier.jpeg" alt="Youth Discipleship Masterclass Flyer" />
    </div>
  </div>

</body>
</html>
